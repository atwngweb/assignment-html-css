<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 2: Bảng kết quả học tập học kỳ</title>
</head>

<body>
    <h1 style="text-align: center;">Bảng kết quả học tập của 5 học sinh</h1>

    <table id="result-table" border="1" width="100%" cellspacing="0" cellpadding="20px">
        <thead>
            <tr>
                <th>STT</th>
                <th>Họ tên</th>
                <th>Toán</th>
                <th>Văn</th>
                <th>Anh</th>
                <th>Điểm trung bình</th>
            </tr>
        </thead>
        <tbody>
            <tr class="excellent">
                <td>1</td>
                <td><em>Nguyễn Văn A</em></td>
                <td>8</td>
                <td>9</td>
                <td>7</td>
                <td>8</td>
            </tr>
            <tr class="warning">
                <td>2</td>
                <td><em>Lê Văn T</em></td>
                <td>4</td>
                <td>4</td>
                <td>4</td>
                <td>4</td>
            </tr>
            <tr class="excellent">
                <td>3</td>
                <td><em>Trần Minh C</em></td>
                <td>9</td>
                <td>9</td>
                <td>9</td>
                <td>9</td>
            </tr>
            <tr>
                <td>4</td>
                <td><em>Nguyễn Anh Tài</em></td>
                <td>5</td>
                <td>9</td>
                <td>8</td>
                <td>7.3</td>
            </tr>
            <tr>
                <td>5</td>
                <td><em>Nguyễn Văn E</em></td>
                <td>7</td>
                <td>7</td>
                <td>7</td>
                <td>7</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th colspan="5"><u>Tổng số học sinh</u></th>
                <td><strong>5</strong></td>
            </tr>
            <tr>
                <th colspan="5"><u>Số học sinh giỏi</u></th>
                <td><strong>2</strong></td>
            </tr>
            <tr>
                <th colspan="5"><u>Số học sinh chưa đạt</u></th>
                <td><strong>1</strong></td>
            </tr>
        </tfoot>


    </table>
</body>

</html>
