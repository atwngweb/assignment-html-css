<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="ex3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="card">
        <div class="item">
            <div class="before">
                <div class="icon">
                    <i class="fa-solid fa-address-card"></i>
                </div>
                <h2 class="before__title">Name Card 1</h2>
                <p class="before__desc">Hover để xem chi tiết</p>
            </div>
            <div class="after">
                <p class="after__title">Title Card After</p>
                <p class="after__desc">Desc Card After</p>
                <span class="after__price">120.000 đ</span>
            </div>
        </div>
        <div class="item">
            <div class="before">
                <div class="icon">
                    <i class="fa-solid fa-basket-shopping"></i>
                </div>
                <h2 class="before__title">Name Card 2</h2>
                <p class="before__desc">Hover để xem chi tiết</p>
            </div>
            <div class="after">
                <p class="after__title">Title Card After</p>
                <p class="after__desc">Desc Card After</p>
                <span class="after__price">120.000 đ</span>
            </div>
        </div>
        <div class="item">
            <div class="before">
                <div class="icon">
                    <i class="fa-solid fa-apple-whole"></i>
                </div>
                <h2 class="before__title">Name Card 3</h2>
                <p class="before__desc">Hover để xem chi tiết</p>
            </div>
            <div class="after">
                <p class="after__title">Title Card After</p>
                <p class="after__desc">Desc Card After</p>
                <span class="after__price">120.000 đ</span>
            </div>
        </div>
    </div>
</body>

</html>
